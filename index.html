<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ 我先聲明，這不是在嘴 AI 笨。是用 3D 視覺化展示 Agent 強化學習的成長過程，很勵志的好嗎。</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050510;--card:#0d1025;--border:#1a1f3a;--accent:#7170ff;--accent2:#4ecdc4;--warn:#f7b731;--bad:#e74c3c;--text:#f0f0f0;--dim:#6a7090;--font-size:16px}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;font-size:var(--font-size)}
#canvas{width:100%;height:100vh;display:block}
header{position:fixed;top:0;left:0;right:0;z-index:10;padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;background:rgba(5,5,16,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
header h1{font-size:1.3em;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.controls{display:flex;gap:.4rem;margin-left:auto}
.btn{padding:.4rem .8rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--dim);font-size:.85em;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--text)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.font-ctrl{position:fixed;top:60px;right:1rem;z-index:12;display:flex;gap:.3rem}
.font-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.font-btn:hover{border-color:var(--accent);background:var(--accent);color:#fff}
.stats{position:fixed;bottom:1.5rem;left:1.5rem;z-index:10;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.5rem;font-size:.9em;min-width:240px}
.stats h3{color:var(--accent2);font-size:1em;margin-bottom:.5rem}
.stat-row{display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border:none}
.stat-val{font-weight:700;font-family:monospace}
.legend{position:fixed;bottom:1.5rem;right:1.5rem;z-index:10;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;font-size:.85em}
.legend-item{display:flex;align-items:center;gap:.5rem;margin:.3rem 0}
.legend-dot{width:12px;height:12px;border-radius:50%}
.epoch-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5rem;font-weight:900;opacity:0;pointer-events:none;z-index:5;transition:opacity .3s,transform .3s;text-shadow:0 0 40px currentColor,0 0 80px currentColor;letter-spacing:-.05em;font-style:italic}
.epoch-label.show{opacity:.9;animation:labelPop .5s ease}
footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.5rem;font-size:.75em;color:var(--dim)}
@keyframes labelPop{0%{transform:translate(-50%,-50%) scale(0.3) rotate(-5deg);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2) rotate(2deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:.9}}
</style>
</head>
<body>
<header>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#bolt-grad)" stroke="none"/>
<defs><linearGradient id="bolt-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7170ff"/><stop offset="100%" stop-color="#4ecdc4"/></linearGradient></defs>
</svg>
<h1>Agent Evolution Visualizer</h1>
<span style="font-size:.8em;color:var(--dim)">Agent Lightning RL 訓練視覺化</span>
<div class="controls">
<button class="btn active" onclick="setSpeed(1)">1x</button>
<button class="btn" onclick="setSpeed(3)">3x</button>
<button class="btn" onclick="setSpeed(0)">⏸</button>
<button class="btn" onclick="reset()">↺ 重置</button>
</div>
</header>
<canvas id="canvas"></canvas>
<!-- 字體大小控制 -->
<div class="font-ctrl">
<button class="font-btn" onclick="changeFontSize(-2)" title="縮小字體">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
</button>
<button class="font-btn" onclick="changeFontSize(2)" title="放大字體">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
</button>
<button class="font-btn" onclick="changeFontSize(0)" title="重置字體">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 3 3 9 9 9"/></svg>
</button>
</div>
<div class="stats" id="stats">
<h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ecdc4" stroke-width="2" style="vertical-align:middle;margin-right:4px"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>訓練狀態</h3>
<div class="stat-row"><span>Epoch</span><span class="stat-val" id="s-epoch">0</span></div>
<div class="stat-row"><span>Reward</span><span class="stat-val" id="s-reward">0.00</span></div>
<div class="stat-row"><span>成功率</span><span class="stat-val" id="s-success">0%</span></div>
<div class="stat-row"><span>Agent 數</span><span class="stat-val" id="s-agents">20</span></div>
<div class="stat-row"><span>最佳策略</span><span class="stat-val" id="s-best">—</span></div>
</div>
<div class="legend">
<div class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#e74c3c"/></svg>低 reward（失敗）</div>
<div class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#f7b731"/></svg>中 reward（學習中）</div>
<div class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#4ecdc4"/></svg>高 reward（成功）</div>
<div class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#7170ff" stroke="#fff" stroke-width="1"/></svg>最佳 Agent</div>
</div>
<div class="epoch-label" id="epoch-label">我變笨了！</div>
<footer>⚡ Agent Lightning 概念展示 · 微軟 Agent RL 訓練視覺化 · by Tonny & 小K</footer>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"}}</script>
<script>
// 字體大小控制
let currentFontSize = parseInt(localStorage.getItem('agl-font-size') || '16');
document.documentElement.style.setProperty('--font-size', currentFontSize + 'px');
function changeFontSize(delta) {
  if (delta === 0) { currentFontSize = 16; }
  else { currentFontSize = Math.max(12, Math.min(28, currentFontSize + delta)); }
  document.documentElement.style.setProperty('--font-size', currentFontSize + 'px');
  localStorage.setItem('agl-font-size', currentFontSize);
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === Config ===
const AGENT_COUNT = 20;
const MAX_EPOCH = 30;
let speed = 1;
let epoch = 0;
let time = 0;
let agents = [];

// === Scene ===
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 25);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// === Lighting ===
scene.add(new THREE.AmbientLight(0x303050, 0.4));
const spot = new THREE.PointLight(0x7170ff, 1, 50);
spot.position.set(0, 20, 0);
scene.add(spot);
const rim = new THREE.PointLight(0x4ecdc4, 0.5, 40);
rim.position.set(10, 5, -10);
scene.add(rim);

// === Grid Floor ===
const gridHelper = new THREE.GridHelper(40, 40, 0x1a1f3a, 0x0d1025);
scene.add(gridHelper);

// === Reward Landscape (terrain) ===
const terrainGeo = new THREE.PlaneGeometry(40, 40, 60, 60);
terrainGeo.rotateX(-Math.PI / 2);
const positions = terrainGeo.attributes.position;
for (let i = 0; i < positions.count; i++) {
  const x = positions.getX(i);
  const z = positions.getZ(i);
  // Multi-peak reward landscape
  const y = 2 * Math.exp(-((x-5)**2 + (z-5)**2) / 20)
          + 3 * Math.exp(-((x+3)**2 + (z+4)**2) / 15)
          + 1.5 * Math.exp(-((x-8)**2 + (z+7)**2) / 25);
  positions.setY(i, y * 0.8);
}
terrainGeo.computeVertexNormals();
const terrainMat = new THREE.MeshStandardMaterial({
  color: 0x0d1025, wireframe: true, transparent: true, opacity: 0.3
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrain);

// === Optimum Marker ===
const optimumGeo = new THREE.ConeGeometry(0.3, 1, 8);
const optimumMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, emissive: 0x4ecdc4, emissiveIntensity: 0.5 });
const optimum = new THREE.Mesh(optimumGeo, optimumMat);
optimum.position.set(-3, 3, -4);
scene.add(optimum);

// === Agents ===
function createAgent(id) {
  const geo = new THREE.SphereGeometry(0.25, 12, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, emissive: 0xe74c3c, emissiveIntensity: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  // Random start position
  const x = (Math.random() - 0.5) * 30;
  const z = (Math.random() - 0.5) * 30;
  mesh.position.set(x, 0.5, z);
  scene.add(mesh);

  // Trail
  const trailGeo = new THREE.BufferGeometry();
  const trailPositions = new Float32Array(300 * 3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeo.setDrawRange(0, 0);
  const trailMat = new THREE.LineBasicMaterial({ color: 0xe74c3c, transparent: true, opacity: 0.3 });
  const trail = new THREE.Line(trailGeo, trailMat);
  scene.add(trail);

  return {
    id, mesh, mat, trail, trailGeo,
    trailIdx: 0,
    x, z,
    vx: 0, vz: 0,
    reward: 0,
    bestReward: 0,
    strategy: randomStrategy(),
  };
}

function randomStrategy() {
  return ['explore', 'exploit', 'gradient', 'random'][Math.floor(Math.random() * 4)];
}

function getReward(x, z) {
  return 2 * Math.exp(-((x-5)**2 + (z-5)**2) / 20)
       + 3 * Math.exp(-((x+3)**2 + (z+4)**2) / 15)
       + 1.5 * Math.exp(-((x-8)**2 + (z+7)**2) / 25);
}

function rewardColor(r) {
  if (r > 2) return 0x4ecdc4;
  if (r > 1) return 0xf7b731;
  return 0xe74c3c;
}

// Init agents
for (let i = 0; i < AGENT_COUNT; i++) agents.push(createAgent(i));

// === Training Step ===
function trainStep(dt) {
  const target = { x: -3, z: -4 }; // Global optimum
  agents.forEach(agent => {
    // Gradient toward optimum + noise (simulated RL)
    const progress = Math.min(epoch / MAX_EPOCH, 1);
    const noise = (1 - progress * 0.8);
    const gradX = (target.x - agent.x) * 0.01 * progress;
    const gradZ = (target.z - agent.z) * 0.01 * progress;

    agent.vx = gradX + (Math.random() - 0.5) * 0.1 * noise;
    agent.vz = gradZ + (Math.random() - 0.5) * 0.1 * noise;
    agent.x += agent.vx * dt * 60;
    agent.z += agent.vz * dt * 60;

    // Clamp
    agent.x = Math.max(-20, Math.min(20, agent.x));
    agent.z = Math.max(-20, Math.min(20, agent.z));

    // Update reward
    agent.reward = getReward(agent.x, agent.z);
    if (agent.reward > agent.bestReward) agent.bestReward = agent.reward;

    // Update visual
    const y = agent.reward * 0.8 + 0.3;
    agent.mesh.position.set(agent.x, y, agent.z);
    const col = rewardColor(agent.reward);
    agent.mat.color.setHex(col);
    agent.mat.emissive.setHex(col);
    agent.mat.emissiveIntensity = 0.3 + agent.reward * 0.2;

    // Scale by reward
    const s = 0.8 + agent.reward * 0.3;
    agent.mesh.scale.setScalar(s);

    // Trail
    const positions = agent.trailGeo.attributes.position;
    const idx = agent.trailIdx % 100;
    positions.setXYZ(idx, agent.x, y, agent.z);
    positions.needsUpdate = true;
    agent.trailGeo.setDrawRange(0, Math.min(agent.trailIdx + 1, 100));
    agent.trailIdx++;
    agent.trail.material.color.setHex(col);
  });
}

// === Epoch Advance ===
let epochTimer = 0;
function advanceEpoch() {
  epoch++;
  if (epoch > MAX_EPOCH) epoch = MAX_EPOCH;

  // Flash epoch label — 星爺風格方唐鏡梗
  const label = document.getElementById('epoch-label');
  const avgR = agents.reduce((s, a) => s + a.reward, 0) / agents.length;
  if (avgR < 0.8) {
    label.textContent = `我變笨了！`;
    label.style.color = '#e74c3c';
  } else if (avgR < 1.5) {
    label.textContent = `我又變聰明了！`;
    label.style.color = '#f7b731';
  } else if (avgR < 2.2) {
    label.textContent = `我超聰明的啦！`;
    label.style.color = '#4ecdc4';
  } else {
    const finals = ['我已經是天才了！', '整個宇宙都是我的！', '你們這些凡人！', '給我跪下！'];
    label.textContent = finals[epoch % finals.length];
    label.style.color = '#7170ff';
  }
  label.classList.remove('show');
  void label.offsetWidth; // force reflow for re-animation
  label.classList.add('show');
  setTimeout(() => label.classList.remove('show'), 2000);

  // Update strategies (simulated selection)
  agents.sort((a, b) => b.reward - a.reward);
  const best = agents[0];
  // Bottom half copies top half's strategy direction
  for (let i = Math.floor(agents.length / 2); i < agents.length; i++) {
    agents[i].strategy = best.strategy;
    // Nudge toward better regions
    agents[i].x += (best.x - agents[i].x) * 0.1;
    agents[i].z += (best.z - agents[i].z) * 0.1;
  }

  // Highlight best
  best.mat.color.setHex(0x7170ff);
  best.mat.emissive.setHex(0x7170ff);
  best.mat.emissiveIntensity = 1;
  best.mesh.scale.setScalar(1.5);

  updateStats();
}

function updateStats() {
  const avgReward = agents.reduce((s, a) => s + a.reward, 0) / agents.length;
  const successRate = agents.filter(a => a.reward > 2).length / agents.length * 100;
  const best = agents.reduce((b, a) => a.reward > b.reward ? a : b, agents[0]);

  document.getElementById('s-epoch').textContent = epoch;
  document.getElementById('s-reward').textContent = avgReward.toFixed(2);
  document.getElementById('s-success').textContent = successRate.toFixed(0) + '%';
  document.getElementById('s-agents').textContent = AGENT_COUNT;
  document.getElementById('s-best').textContent = `#${best.id} (${best.reward.toFixed(2)})`;
}

// === Controls ===
window.setSpeed = (s) => {
  speed = s;
  document.querySelectorAll('.controls .btn').forEach((b, i) => b.classList.toggle('active', i === [1, 3, 0].indexOf(s)));
};
window.reset = () => {
  agents.forEach(a => { scene.remove(a.mesh); scene.remove(a.trail); });
  agents = [];
  for (let i = 0; i < AGENT_COUNT; i++) agents.push(createAgent(i));
  epoch = 0; epochTimer = 0; time = 0;
  updateStats();
};

// === Animation ===
let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05) * speed;
  lastTime = now;

  if (speed > 0) {
    time += dt;
    trainStep(dt);

    epochTimer += dt;
    if (epochTimer > 2) { // New epoch every 2 seconds
      epochTimer = 0;
      advanceEpoch();
    }
  }

  // Rotate optimum marker
  optimum.rotation.y += 0.02;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// === Resize ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateStats();
</script>
</body>
</html>
